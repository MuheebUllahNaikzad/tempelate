<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iConvert Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="iphone">
        <div class="notch-container">
            <div class="status-bar">
                <span id="clock">9:41</span>
                <div class="dynamic-island"></div>
                <div class="status-icons">📶 🪫</div>
            </div>
        </div>

        <main class="converter-screen">
            <header>
                <select id="category-selector" class="category-pill">
                    <option value="mass">Weight & Mass</option>
                    <option value="length">Length</option>
                    <option value="volume">Volume</option>
                    <option value="area">Area</option>
                    <option value="temperature">Temperature</option>
                </select>
            </header>

            <div class="display-area">
                <div class="unit-row active" id="row-from">
                    <select id="unit-from" class="unit-label"></select>
                    <div class="value-display" id="input-val">0</div>
                </div>
                
                <div class="divider">
                    <span>⇅</span>
                </div>

                <div class="unit-row" id="row-to">
                    <select id="unit-to" class="unit-label"></select>
                    <div class="value-display result" id="output-val">0</div>
                </div>
            </div>

            <section class="keypad">
                <button class="key" data-val="7">7</button>
                <button class="key" data-val="8">8</button>
                <button class="key" data-val="9">9</button>
                <button class="key" data-val="4">4</button>
                <button class="key" data-val="5">5</button>
                <button class="key" data-val="6">6</button>
                <button class="key" data-val="1">1</button>
                <button class="key" data-val="2">2</button>
                <button class="key" data-val="3">3</button>
                <button class="key" data-val=".">.</button>
                <button class="key" data-val="0">0</button>
                <button class="key action" data-val="clear">C</button>
            </section>
        </main>
        
        <div class="home-bar"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
